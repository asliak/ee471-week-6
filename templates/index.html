<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure Speech Services</title>
    <style>
        :root {
            --page-bg: #f5f5f7;
            --card-bg: #ffffff;
            --card-border: #6b63d9;
            --title: #2d3748;
            --muted: #8a94a6;
            --label: #4a5568;
            --field-border: #d9dce5;
            --primary-start: #6c63db;
            --primary-end: #8c53d9;
            --primary-shadow: rgba(108, 99, 219, 0.28);
            --neutral: #efefef;
            --danger: #ff3b5c;
            --danger-dark: #ec2348;
            --success-bg: #e9faea;
            --success-border: #c8efca;
            --success-text: #29b34a;
            --error-bg: #fff0f0;
            --error-border: #ffc9c9;
            --error-text: #dc2626;
            --info-bg: #eef7ff;
            --info-border: #bcdafc;
            --download: #18a0f0;
            --download-dark: #1190da;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            padding: 24px;
            background: var(--page-bg);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--title);
        }

        .page {
            max-width: 1120px;
            margin: 0 auto;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 32px;
            align-items: start;
        }

        .app-card {
            background: var(--card-bg);
            border: 6px solid var(--card-border);
            border-radius: 10px;
            padding: 28px 30px 32px;
            box-shadow: 0 16px 35px rgba(80, 78, 142, 0.08);
        }

        .title {
            margin: 0;
            text-align: center;
            font-size: clamp(2rem, 4vw, 2.25rem);
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .subtitle {
            margin: 6px 0 28px;
            text-align: center;
            font-size: 0.92rem;
            color: var(--muted);
        }

        .field-label,
        .section-title {
            display: block;
            margin-bottom: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--label);
        }

        textarea,
        input[type="file"] {
            width: 100%;
            border: 2px solid var(--field-border);
            border-radius: 10px;
            padding: 12px 14px;
            font: inherit;
            background: #fff;
        }

        textarea {
            min-height: 118px;
            resize: vertical;
            outline: none;
            color: #374151;
            box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.03);
        }

        textarea:focus {
            border-color: #9c96ea;
            box-shadow: 0 0 0 4px rgba(108, 99, 219, 0.1);
        }

        input[type="file"]::file-selector-button {
            margin-right: 10px;
            padding: 8px 10px;
            border: 0;
            border-radius: 8px;
            background: #efefef;
            color: #374151;
            cursor: pointer;
            font: inherit;
            font-weight: 700;
        }

        .actions,
        .record-row {
            display: grid;
            gap: 12px;
        }

        .actions {
            margin-top: 16px;
            grid-template-columns: 1fr 0.9fr;
        }

        .record-row {
            grid-template-columns: 1fr 1fr 1.4fr;
            align-items: center;
        }

        button,
        .download-link,
        .copy-btn {
            border: 0;
            border-radius: 8px;
            font: inherit;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        button:hover,
        .download-link:hover,
        .copy-btn:hover {
            transform: translateY(-1px);
        }

        .primary-btn {
            color: #fff;
            padding: 14px 16px;
            background: linear-gradient(90deg, var(--primary-start), var(--primary-end));
            box-shadow: 0 10px 24px var(--primary-shadow);
        }

        .secondary-btn {
            padding: 14px 16px;
            background: var(--neutral);
            color: #4b5563;
        }

        .danger-btn {
            color: #fff;
            padding: 12px 14px;
            background: linear-gradient(180deg, var(--danger), var(--danger-dark));
        }

        .status {
            margin-top: 16px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 0.98rem;
            font-weight: 700;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }

        .status.error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
        }

        .status.info {
            background: #fff4f4;
            border: 1px solid #ffa8a8;
            color: #ef4444;
        }

        .audio-card,
        .output-card {
            margin-top: 16px;
            border-radius: 10px;
            padding: 16px;
        }

        .audio-card {
            border: 2px solid #e2e6ef;
            display: none;
        }

        .audio-card.visible {
            display: block;
        }

        .output-card {
            border: 2px solid var(--info-border);
            background: var(--info-bg);
        }

        audio {
            width: 100%;
            margin: 10px 0 14px;
        }

        .download-link {
            display: block;
            width: 100%;
            padding: 12px 14px;
            color: #fff;
            background: linear-gradient(180deg, var(--download), var(--download-dark));
        }

        .output-box {
            min-height: 74px;
            padding: 14px;
            border: 1px solid #d8e8fa;
            border-radius: 8px;
            background: #fff;
            color: #374151;
            white-space: pre-wrap;
        }

        .copy-btn {
            margin-top: 12px;
            padding: 10px 14px;
            background: #efefef;
            color: #4b5563;
        }

        @media (max-width: 960px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 560px) {
            .app-card {
                padding: 22px 18px 24px;
            }

            .actions,
            .record-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="grid">
            <article class="app-card">
                <h1 class="title">Text-to-Speech</h1>
                <p class="subtitle">Powered by Azure Cognitive Services</p>

                <label class="field-label" for="textInput">Enter text to convert to speech:</label>
                <textarea id="textInput" placeholder="Hello, EE471 class"></textarea>

                <div class="actions">
                    <button id="ttsButton" class="primary-btn" type="button">Synthesize Speech</button>
                    <button id="ttsClearButton" class="secondary-btn" type="button">Clear</button>
                </div>

                <div id="ttsStatus" class="status" aria-live="polite"></div>

                <section id="audioCard" class="audio-card">
                    <span class="section-title">Generated Audio:</span>
                    <audio id="audioPlayer" controls></audio>
                    <a id="downloadLink" class="download-link" download="speech.wav">Download Audio</a>
                </section>
            </article>

            <article class="app-card">
                <h1 class="title">Speech-to-Text</h1>
                <p class="subtitle">Powered by Azure Cognitive Services</p>

                <label class="field-label">Record speech or upload audio to convert to text:</label>

                <div class="record-row">
                    <button id="recordButton" class="primary-btn" type="button">Start Recording</button>
                    <button id="stopButton" class="danger-btn" type="button">Stop Recording</button>
                    <input id="audioInput" type="file" accept=".wav">
                </div>

                <div id="recordingStatus" class="status" aria-live="polite"></div>

                <div class="actions">
                    <button id="transcribeButton" class="primary-btn" type="button">Transcribe Audio</button>
                    <button id="sttClearButton" class="secondary-btn" type="button">Clear</button>
                </div>

                <section class="output-card">
                    <span class="section-title">Transcription:</span>
                    <div id="transcriptionOutput" class="output-box">Your transcription will appear here.</div>
                    <button id="copyButton" class="copy-btn" type="button">Copy Text</button>
                </section>

                <div id="sttStatus" class="status"></div>
            </article>
        </section>
    </main>

    <script>
        const textInput = document.getElementById("textInput");
        const ttsButton = document.getElementById("ttsButton");
        const ttsClearButton = document.getElementById("ttsClearButton");
        const ttsStatus = document.getElementById("ttsStatus");
        const audioCard = document.getElementById("audioCard");
        const audioPlayer = document.getElementById("audioPlayer");
        const downloadLink = document.getElementById("downloadLink");

        const recordButton = document.getElementById("recordButton");
        const stopButton = document.getElementById("stopButton");
        const transcribeButton = document.getElementById("transcribeButton");
        const sttClearButton = document.getElementById("sttClearButton");
        const copyButton = document.getElementById("copyButton");
        const audioInput = document.getElementById("audioInput");
        const recordingStatus = document.getElementById("recordingStatus");
        const sttStatus = document.getElementById("sttStatus");
        const transcriptionOutput = document.getElementById("transcriptionOutput");

        let isMicrophoneListening = false;

        ttsButton.addEventListener("click", convertText);
        ttsClearButton.addEventListener("click", clearTtsForm);
        recordButton.addEventListener("click", startMicrophoneRecognition);
        stopButton.addEventListener("click", stopMicrophoneHint);
        transcribeButton.addEventListener("click", transcribeUploadedFile);
        sttClearButton.addEventListener("click", clearSttForm);
        copyButton.addEventListener("click", copyTranscription);

        function setStatus(element, message, type) {
            element.textContent = message;
            element.className = `status show ${type}`;
        }

        function hideStatus(element) {
            element.textContent = "";
            element.className = "status";
        }

        function clearTtsForm() {
            textInput.value = "";
            hideStatus(ttsStatus);
            audioPlayer.removeAttribute("src");
            downloadLink.removeAttribute("href");
            audioCard.classList.remove("visible");
        }

        function clearSttForm() {
            audioInput.value = "";
            transcriptionOutput.textContent = "Your transcription will appear here.";
            hideStatus(recordingStatus);
            hideStatus(sttStatus);
            isMicrophoneListening = false;
            recordButton.disabled = false;
        }

        async function convertText() {
            const text = textInput.value.trim();
            if (!text) {
                setStatus(ttsStatus, "Please enter some text first.", "error");
                return;
            }

            ttsButton.disabled = true;
            setStatus(ttsStatus, "Generating speech...", "success");

            try {
                const response = await fetch("/synthesize", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.error || "Text-to-speech failed.");
                }

                const audioUrl = `${data.audio_url}?t=${Date.now()}`;
                audioPlayer.src = audioUrl;
                downloadLink.href = audioUrl;
                audioCard.classList.add("visible");
                setStatus(ttsStatus, "Speech synthesized successfully!", "success");
            } catch (error) {
                setStatus(ttsStatus, error.message, "error");
                audioCard.classList.remove("visible");
            } finally {
                ttsButton.disabled = false;
            }
        }

        async function startMicrophoneRecognition() {
            if (isMicrophoneListening) {
                return;
            }

            isMicrophoneListening = true;
            recordButton.disabled = true;
            setStatus(recordingStatus, "Recording... Speak into your microphone now.", "info");
            hideStatus(sttStatus);

            try {
                const response = await fetch("/transcribe-microphone", {
                    method: "POST"
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.error || "Speech-to-text failed.");
                }

                transcriptionOutput.textContent = data.text;
                hideStatus(recordingStatus);
                setStatus(sttStatus, "Audio transcribed successfully!", "success");
            } catch (error) {
                setStatus(sttStatus, error.message, "error");
                setStatus(recordingStatus, "Microphone transcription stopped.", "error");
            } finally {
                isMicrophoneListening = false;
                recordButton.disabled = false;
            }
        }

        function stopMicrophoneHint() {
            if (!isMicrophoneListening) {
                setStatus(recordingStatus, "No active microphone session to stop.", "error");
                return;
            }

            setStatus(
                recordingStatus,
                "The backend listens for a single utterance and stops automatically after you speak.",
                "info"
            );
        }

        async function transcribeUploadedFile() {
            hideStatus(recordingStatus);
            hideStatus(sttStatus);

            if (!audioInput.files.length) {
                setStatus(sttStatus, "Please choose a WAV file first.", "error");
                return;
            }

            const formData = new FormData();
            formData.append("audio", audioInput.files[0]);
            transcriptionOutput.textContent = "Working...";

            try {
                const response = await fetch("/transcribe-file", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.error || "Speech-to-text failed.");
                }

                transcriptionOutput.textContent = data.text;
                setStatus(sttStatus, "Audio transcribed successfully!", "success");
            } catch (error) {
                transcriptionOutput.textContent = "Your transcription will appear here.";
                setStatus(sttStatus, error.message, "error");
            }
        }

        async function copyTranscription() {
            const text = transcriptionOutput.textContent.trim();
            if (!text || text === "Your transcription will appear here." || text === "Working...") {
                setStatus(sttStatus, "There is no transcription to copy yet.", "error");
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                setStatus(sttStatus, "Transcription copied to clipboard.", "success");
            } catch (error) {
                setStatus(sttStatus, "Copy failed. Please copy the text manually.", "error");
            }
        }
    </script>
</body>
</html>
