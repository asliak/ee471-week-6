<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech-to-Text</title>
    <style>
        :root {
            --page-bg: #f5f5f7;
            --card-bg: #ffffff;
            --card-border: #6b63d9;
            --title: #2d3748;
            --muted: #8a94a6;
            --label: #4a5568;
            --field-border: #d9dce5;
            --primary-start: #6c63db;
            --primary-end: #8c53d9;
            --primary-shadow: rgba(108, 99, 219, 0.28);
            --neutral: #efefef;
            --danger: #ff3b5c;
            --danger-dark: #ec2348;
            --info-bg: #eef7ff;
            --info-border: #bcdafc;
            --success-bg: #e9faea;
            --success-border: #c8efca;
            --success-text: #29b34a;
            --error-bg: #fff0f0;
            --error-border: #ffc9c9;
            --error-text: #dc2626;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--page-bg);
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--title);
        }

        .app-card {
            width: min(100%, 500px);
            background: var(--card-bg);
            border: 6px solid var(--card-border);
            border-radius: 10px;
            padding: 28px 30px 32px;
            box-shadow: 0 16px 35px rgba(80, 78, 142, 0.08);
        }

        .title {
            margin: 0;
            text-align: center;
            font-size: clamp(2rem, 4vw, 2.2rem);
            font-weight: 800;
            letter-spacing: -0.03em;
        }

        .subtitle {
            margin: 6px 0 28px;
            text-align: center;
            font-size: 0.92rem;
            color: var(--muted);
        }

        .section-label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--label);
        }

        .record-row,
        .actions {
            display: grid;
            gap: 12px;
        }

        .record-row {
            grid-template-columns: 1fr 1fr 1.4fr;
            align-items: center;
        }

        .actions {
            margin-top: 16px;
            grid-template-columns: 1fr 0.9fr;
        }

        button,
        .copy-btn,
        input[type="file"]::file-selector-button {
            border: 0;
            border-radius: 8px;
            font: inherit;
            font-weight: 700;
        }

        button,
        .copy-btn {
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
        }

        button:hover,
        .copy-btn:hover {
            transform: translateY(-1px);
        }

        .primary-btn {
            color: #fff;
            padding: 14px 16px;
            background: linear-gradient(90deg, var(--primary-start), var(--primary-end));
            box-shadow: 0 10px 24px var(--primary-shadow);
        }

        .secondary-btn {
            padding: 14px 16px;
            background: var(--neutral);
            color: #4b5563;
        }

        .danger-btn {
            color: #fff;
            padding: 12px 14px;
            background: linear-gradient(180deg, var(--danger), var(--danger-dark));
        }

        .mic-btn {
            color: #fff;
            padding: 12px 14px;
            background: linear-gradient(90deg, var(--primary-start), var(--primary-end));
        }

        input[type="file"] {
            width: 100%;
            border: 2px solid var(--field-border);
            border-radius: 8px;
            padding: 10px;
            background: #fff;
            font: inherit;
        }

        input[type="file"]::file-selector-button {
            margin-right: 10px;
            padding: 8px 10px;
            background: #efefef;
            color: #374151;
            cursor: pointer;
        }

        .status {
            margin-top: 14px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 0.98rem;
            font-weight: 700;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.info {
            background: #fff4f4;
            border: 1px solid #ffa8a8;
            color: #ef4444;
        }

        .status.success {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
        }

        .status.error {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
        }

        .output-card {
            margin-top: 16px;
            border: 2px solid var(--info-border);
            border-radius: 10px;
            padding: 16px;
            background: var(--info-bg);
        }

        .output-title {
            display: block;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .output-box {
            min-height: 74px;
            padding: 14px;
            border: 1px solid #d8e8fa;
            border-radius: 8px;
            background: #fff;
            color: #374151;
            white-space: pre-wrap;
        }

        .copy-btn {
            margin-top: 12px;
            padding: 10px 14px;
            background: #efefef;
            color: #4b5563;
        }

        @media (max-width: 560px) {
            .app-card {
                padding: 22px 18px 24px;
            }

            .record-row,
            .actions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="app-card">
        <h1 class="title">Speech-to-Text</h1>
        <p class="subtitle">Powered by Azure Cognitive Services</p>

        <label class="section-label">Record speech or upload audio to convert to text:</label>

        <div class="record-row">
            <button id="recordButton" class="mic-btn" type="button">Start Recording</button>
            <button id="stopButton" class="danger-btn" type="button">Stop Recording</button>
            <input id="audioInput" type="file" accept=".wav">
        </div>

        <div id="recordingStatus" class="status" aria-live="polite"></div>

        <div class="actions">
            <button id="transcribeButton" class="primary-btn" type="button">Transcribe Audio</button>
            <button id="clearButton" class="secondary-btn" type="button">Clear</button>
        </div>

        <section class="output-card">
            <span class="output-title">Transcription:</span>
            <div id="transcriptionOutput" class="output-box">Your transcription will appear here.</div>
            <button id="copyButton" class="copy-btn" type="button">Copy Text</button>
        </section>

        <div id="resultStatus" class="status"></div>
    </main>

    <script>
        const recordButton = document.getElementById("recordButton");
        const stopButton = document.getElementById("stopButton");
        const transcribeButton = document.getElementById("transcribeButton");
        const clearButton = document.getElementById("clearButton");
        const copyButton = document.getElementById("copyButton");
        const audioInput = document.getElementById("audioInput");
        const recordingStatus = document.getElementById("recordingStatus");
        const resultStatus = document.getElementById("resultStatus");
        const transcriptionOutput = document.getElementById("transcriptionOutput");

        let isMicrophoneListening = false;

        recordButton.addEventListener("click", startMicrophoneRecognition);
        stopButton.addEventListener("click", stopMicrophoneHint);
        transcribeButton.addEventListener("click", transcribeUploadedFile);
        clearButton.addEventListener("click", clearForm);
        copyButton.addEventListener("click", copyTranscription);

        function setStatus(element, message, type) {
            element.textContent = message;
            element.className = `status show ${type}`;
        }

        function hideStatus(element) {
            element.textContent = "";
            element.className = "status";
        }

        function clearForm() {
            audioInput.value = "";
            transcriptionOutput.textContent = "Your transcription will appear here.";
            hideStatus(recordingStatus);
            hideStatus(resultStatus);
            isMicrophoneListening = false;
            recordButton.disabled = false;
        }

        async function startMicrophoneRecognition() {
            if (isMicrophoneListening) {
                return;
            }

            isMicrophoneListening = true;
            recordButton.disabled = true;
            setStatus(recordingStatus, "Recording... Speak into your microphone now.", "info");
            hideStatus(resultStatus);

            try {
                const response = await fetch("/transcribe-microphone", {
                    method: "POST"
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.error || "Speech-to-text failed.");
                }

                transcriptionOutput.textContent = data.text;
                setStatus(resultStatus, "Audio transcribed successfully!", "success");
                hideStatus(recordingStatus);
            } catch (error) {
                setStatus(resultStatus, error.message, "error");
                setStatus(recordingStatus, "Microphone transcription stopped.", "error");
            } finally {
                isMicrophoneListening = false;
                recordButton.disabled = false;
            }
        }

        function stopMicrophoneHint() {
            if (!isMicrophoneListening) {
                setStatus(recordingStatus, "No active microphone session to stop.", "error");
                return;
            }

            setStatus(
                recordingStatus,
                "The backend listens for a single utterance and will stop automatically after you speak.",
                "info"
            );
        }

        async function transcribeUploadedFile() {
            hideStatus(recordingStatus);
            hideStatus(resultStatus);

            if (!audioInput.files.length) {
                setStatus(resultStatus, "Please choose a WAV file first.", "error");
                return;
            }

            const formData = new FormData();
            formData.append("audio", audioInput.files[0]);
            transcriptionOutput.textContent = "Working...";

            try {
                const response = await fetch("/transcribe-file", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();
                if (!response.ok || !data.success) {
                    throw new Error(data.error || "Speech-to-text failed.");
                }

                transcriptionOutput.textContent = data.text;
                setStatus(resultStatus, "Audio transcribed successfully!", "success");
            } catch (error) {
                transcriptionOutput.textContent = "Your transcription will appear here.";
                setStatus(resultStatus, error.message, "error");
            }
        }

        async function copyTranscription() {
            const text = transcriptionOutput.textContent.trim();
            if (!text || text === "Your transcription will appear here." || text === "Working...") {
                setStatus(resultStatus, "There is no transcription to copy yet.", "error");
                return;
            }

            try {
                await navigator.clipboard.writeText(text);
                setStatus(resultStatus, "Transcription copied to clipboard.", "success");
            } catch (error) {
                setStatus(resultStatus, "Copy failed. Please copy the text manually.", "error");
            }
        }
    </script>
</body>
</html>
